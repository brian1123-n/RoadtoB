<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Marketplace MY</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:#f4f6fb;
}

.header{
background:#0f172a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.box{
background:white;
padding:15px;
margin:15px auto;
max-width:500px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.primary{background:#2563eb;color:white;}
.dark{background:#0f172a;color:white;}
.red{background:#ef4444;color:white;}

.container{padding:15px;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.price{color:#16a34a;font-weight:bold;}

.compareBox{
background:white;
padding:15px;
margin-top:15px;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div>🏠 Property Marketplace</div>
<div id="userStatus">Loading...</div>
</div>

<!-- AUTH -->
<div id="authBox" class="box">
<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button class="primary" onclick="signup()">Sign Up</button>
<button class="dark" onclick="login()">Login</button>

<div id="msg"></div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<button class="red" onclick="logout()">Logout</button>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="box" style="display:none;">
<h3>🧑‍💼 Admin Panel</h3>

<input id="pname" placeholder="Name">
<input id="plocation" placeholder="Location">
<input id="ptype" placeholder="Type">
<input id="pprice" placeholder="Price RM">

<button class="primary" onclick="addProperty()">Add Property</button>
</div>

<!-- PROPERTY LIST -->
<h3>Properties</h3>
<div id="list" class="grid"></div>

<!-- COMPARE -->
<button class="primary" onclick="showCompare()">
Compare (<span id="compareCount">0</span>)
</button>

<div id="compareBox" class="compareBox"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
authDomain: "roadtob-d0c2d.firebaseapp.com",
projectId: "roadtob-d0c2d"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

/* DOM */
const authBox = document.getElementById("authBox");
const appBox = document.getElementById("app");
const userStatus = document.getElementById("userStatus");
const list = document.getElementById("list");

/* STATE */
let properties = [];
let compare = [];
let isAdmin = false;

/* ADMIN EMAIL */
const ADMIN_EMAIL = "admin@gmail.com";

/* AUTH */
window.signup = async () => {
try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
msg.innerText = "Signup success";
}catch(e){
msg.innerText = e.message;
}
};

window.login = async () => {
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
msg.innerText = "Login success";
}catch(e){
msg.innerText = e.message;
}
};

window.logout = async () => {
await signOut(auth);
compare = [];
};

/* AUTH STATE */
onAuthStateChanged(auth, async (user) => {

if(!user){
authBox.style.display = "block";
appBox.style.display = "none";
userStatus.innerText = "Not logged in";
return;
}

isAdmin = (user.email === ADMIN_EMAIL);

authBox.style.display = "none";
appBox.style.display = "block";

userStatus.innerText = isAdmin ? "Admin: " + user.email : user.email;

document.getElementById("adminPanel").style.display =
isAdmin ? "block" : "none";

await load();

});

/* LOAD */
async function load(){

const snap = await getDocs(collection(db,"properties"));

properties = snap.docs.map(d => ({
id: d.id,
...d.data()
}));

render();

}

/* RENDER */
function render(){

if(properties.length === 0){
list.innerHTML = "<p>No properties found</p>";
return;
}

list.innerHTML = properties.map((p,i)=>`
<div class="card">
<h3>${p.name}</h3>
<p>${p.location}</p>
<p>${p.type}</p>
<p class="price">RM ${p.price}</p>

<button onclick="addCompare(${i})">Compare</button>
<button onclick="addFav('${p.id}')">Favourite</button>

${isAdmin ? `
<button style="background:red;color:white"
onclick="deleteProperty('${p.id}')">
Delete
</button>` : ""}

</div>
`).join("");

}

/* ADD PROPERTY (ADMIN) */
window.addProperty = async function(){

await addDoc(collection(db,"properties"),{
name: pname.value,
location: plocation.value,
type: ptype.value,
price: Number(pprice.value),
createdAt: serverTimestamp()
});

load();

};

/* DELETE */
window.deleteProperty = async function(id){

if(!isAdmin) return;

await deleteDoc(doc(db,"properties",id));

load();

};

/* COMPARE */
window.addCompare = function(i){

if(compare.length >= 3){
alert("Max 3 only");
return;
}

compare.push(properties[i]);

document.getElementById("compareCount").innerText = compare.length;

};

/* SHOW COMPARE */
window.showCompare = function(){

if(compare.length < 2){
alert("Select at least 2");
return;
}

document.getElementById("compareBox").innerHTML = `
<h3>Comparison</h3>

<table>
<tr>
<th>Field</th>
${compare.map(p=>`<th>${p.name}</th>`).join("")}
</tr>

<tr>
<td>Price</td>
${compare.map(p=>`<td>${p.price}</td>`).join("")}
</tr>

<tr>
<td>Location</td>
${compare.map(p=>`<td>${p.location}</td>`).join("")}
</tr>

<tr>
<td>Type</td>
${compare.map(p=>`<td>${p.type}</td>`).join("")}
</tr>

</table>
`;

};

/* FAVOURITES */
window.addFav = function(id){

let fav = JSON.parse(localStorage.getItem("fav") || "[]");

if(!fav.includes(id)){
fav.push(id);
}

localStorage.setItem("fav", JSON.stringify(fav));

alert("Added to favourites");

};

</script>

</body>
</html>
