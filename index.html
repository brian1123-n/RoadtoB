<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadToB Property Platform</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
}

.layout{
display:grid;
grid-template-columns:260px 1fr 320px;
gap:20px;
}

.panel,.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2563eb;
color:white;
font-weight:bold;
}

.red{
background:#ef4444;
}

.price{
color:green;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<div>🏠 RoadToB Property</div>
<div id="userStatus">Loading...</div>
</div>

<!-- LOGIN -->

<div id="authBox"
class="panel"
style="
max-width:420px;
margin:30px auto;
">

<h3>Login</h3>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="signup()">
Sign Up
</button>

<button onclick="login()">
Login
</button>

<div id="msg"></div>

</div>

<!-- APP -->

<div id="app"
class="container"
style="display:none;">

<button
class="red"
onclick="logout()">
Logout
</button>

<div class="layout">

<!-- LEFT -->

<div class="panel">

<h3>Search</h3>

<input
id="search"
placeholder="Search"
onkeyup="render()">

<select
id="typeFilter"
onchange="render()">

<option value="">
All
</option>

<option value="Condo">
Condo
</option>

<option value="Landed">
Landed
</option>

</select>

<hr>

<h3>Add Property</h3>

<input
id="pname"
placeholder="Name">

<input
id="plocation"
placeholder="Location">

<input
id="ptype"
placeholder="Type">

<input
id="pprice"
placeholder="Price">

<button
onclick="addProperty()">
Add Property
</button>

</div>

<!-- CENTER -->

<div>

<h3>Properties</h3>

<div
id="list"
class="grid">
</div>

</div>

<!-- RIGHT -->

<div class="panel">

<h3>🏠 Loan Calculator</h3>

<input
id="loanPrice"
placeholder="Price">

<input
id="loanDown"
value="10">

<input
id="loanRate"
value="4.2">

<input
id="loanYear"
value="35">

<button
onclick="calcLoan()">
Calculate
</button>

<div id="loanResult"></div>

<hr>

<h3>Investment</h3>

<div id="detailPanel">
Select property
</div>

</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
addDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig={

apiKey:"AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",

authDomain:
"roadtob-d0c2d.firebaseapp.com",

projectId:
"roadtob-d0c2d"

};

const appFirebase=
initializeApp(
firebaseConfig
);

const auth=
getAuth(
appFirebase
);

const db=
getFirestore(
appFirebase
);

let properties=[];

/* AUTH */

window.signup=
async()=>{

try{

await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

msg.innerText=
"Signup success";

}catch(e){

msg.innerText=
e.message;

}

};

window.login=
async()=>{

try{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

msg.innerText=
"Login success";

}catch(e){

msg.innerText=
e.message;

}

};

window.logout=
async()=>{

await signOut(auth);

};

/* LOGIN */

onAuthStateChanged(
auth,
async(user)=>{

if(!user){

authBox.style.display="block";

app.style.display="none";

return;

}

authBox.style.display="none";

app.style.display="block";

userStatus.innerText=
user.email;

await load();

});

/* LOAD */

async function load(){

try{

const snap=
await getDocs(
collection(
db,
"properties"
)
);

properties=
snap.docs.map(
d=>({

id:d.id,

name:
d.data().name || "",

location:
d.data().location || "",

type:
d.data().type || "",

price:
d.data().price || 0

})
);

}catch(e){

console.log(e);

properties=[];

}

if(
properties.length===0
){

properties=[

{
name:"Connaught One",
location:"Cheras",
type:"Condo",
price:464000
},

{
name:"Aricia Residences",
location:"Sungai Long",
type:"Condo",
price:530000
}

];

}

render();

}

/* ADD */

window.addProperty=
async()=>{

try{

if(
!pname.value ||
!plocation.value ||
!ptype.value ||
!pprice.value
){

alert(
"Fill all fields"
);

return;

}

await addDoc(
collection(
db,
"properties"
),
{

name:
pname.value,

location:
plocation.value,

type:
ptype.value,

price:
Number(
pprice.value
)

}
);

alert(
"Added"
);

pname.value="";
plocation.value="";
ptype.value="";
pprice.value="";

await load();

}catch(e){

alert(
e.message
);

}

};

/* RENDER */

window.render=
()=>{

let keyword=
(
search.value ||
""
)
.toLowerCase();

let type=
typeFilter.value;

let filtered=
properties.filter(
p=>{

let pname=
(
p.name ||
""
)
.toLowerCase();

let ptype=
(
p.type ||
""
);

return(

pname.includes(
keyword
)

&&

(
type==""

||

ptype==
type
)

);

}
);

list.innerHTML=
filtered.map(
(p,index)=>`

<div class="card">

<h3>
${p.name || "Unnamed"}
</h3>

<p>
${p.location || "-"}
</p>

<p>
${p.type || "-"}
</p>

<p class="price">
RM ${p.price || 0}
</p>

<button
onclick="
openDetail(${index})
">
Analyse
</button>

</div>

`
).join("");

};

/* DETAIL */

window.openDetail=
(i)=>{

let p=
properties[i];

let rent=
(
p.price||0
)
*0.004;

let roi=
(
rent*12
/
(
p.price||1
)
)
*100;

detailPanel.innerHTML=`

<p>
<b>
${p.name}
</b>
</p>

<p>
Rent:
RM
${rent.toFixed(0)}
</p>

<p>
ROI:
${roi.toFixed(2)}%
</p>

`;

};

/* LOAN */

window.calcLoan=
()=>{

let price=
Number(
loanPrice.value
);

let down=
Number(
loanDown.value
);

let rate=
Number(
loanRate.value
);

let year=
Number(
loanYear.value
);

let loan=
price*
(
1-down/100
);

let r=
rate/100/12;

let n=
year*12;

let monthly=
(
loan*r
)
/
(
1-
Math.pow(
1+r,
-n
)
);

loanResult.innerHTML=`

<p>
Loan:
RM
${loan.toFixed(0)}
</p>

<p>
Monthly:
RM
${monthly.toFixed(0)}
</p>

`;

};

</script>

</body>
</html>
