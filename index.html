<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyIntel MY - Level 5 SaaS</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#eef2f7;
}

/* NAV */
.nav{
    background:#0f172a;
    color:white;
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.badge{
    background:#22c55e;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

/* LOGIN BOX */
.box{
    background:white;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    max-width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn1{ background:#1d4ed8; color:white; }
.btn2{ background:#0f172a; color:white; }
.btn3{ background:#22c55e; color:white; }

/* SEARCH */
.search{
    text-align:center;
    margin:15px;
}

.search input{
    max-width:400px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.price{
    font-size:18px;
    font-weight:bold;
    color:#16a34a;
}
</style>
</head>

<body>

<div class="nav">
    <div>🏠 PropertyIntel MY</div>
    <div id="planTag" class="badge">FREE</div>
</div>

<div class="box">
    <h3>Login / Register</h3>

    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">

    <button class="btn1" onclick="signup()">Sign Up</button>
    <button class="btn2" onclick="login()">Login</button>

    <button class="btn3" onclick="loadProperties()">
        Refresh Properties
    </button>

    <div id="status">Not logged in</div>
</div>

<div class="search">
    <input id="searchBox" placeholder="Search property..." onkeyup="filter()">
</div>

<div class="grid" id="list"></div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
  authDomain: "roadtob-d0c2d.firebaseapp.com",
  projectId: "roadtob-d0c2d",
  storageBucket: "roadtob-d0c2d.firebasestorage.app",
  messagingSenderId: "795422777154",
  appId: "1:795422777154:web:a4a23653d849dd2d1572db"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentPlan = "free";
let allProperties = [];

/* SIGNUP */
window.signup = async function(){
    const email = emailBox();
    const pass = passBox();

    const user = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db,"users",user.user.uid),{
        email,
        plan:"free"
    });

    alert("Signup success");
};

/* LOGIN */
window.login = async function(){
    const email = emailBox();
    const pass = passBox();

    await signInWithEmailAndPassword(auth,email,pass);

    alert("Login success");
};

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
    if(!user) return;

    let snap = await getDoc(doc(db,"users",user.uid));

    currentPlan = snap.exists() ? snap.data().plan : "free";

    document.getElementById("status").innerText =
    user.email + " (" + currentPlan + ")";

    document.getElementById("planTag").innerText =
    currentPlan.toUpperCase();

    loadProperties();
});

/* LOAD FIRESTORE PROPERTIES */
window.loadProperties = async function(){

    const snap = await getDocs(collection(db,"properties"));

    allProperties = [];

    snap.forEach(d=>{
        allProperties.push(d.data());
    });

    render(allProperties);
};

/* RENDER */
function render(data){

    let html = "";

    data.forEach(p=>{
        html += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>📍 ${p.location}</p>
            <p>🏢 ${p.type}</p>
            <p>📐 ${p.size} sqft</p>
            <div class="price">RM ${p.price}</div>
        </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

/* SEARCH FILTER */
window.filter = function(){

    let keyword = document.getElementById("searchBox").value.toLowerCase();

    let filtered = allProperties.filter(p =>
        p.name.toLowerCase().includes(keyword) ||
        p.location.toLowerCase().includes(keyword)
    );

    render(filtered);
};

/* HELPERS */
function emailBox(){
    return document.getElementById("email").value;
}
function passBox(){
    return document.getElementById("password").value;
}

</script>

</body>
</html>
