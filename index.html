<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyIntel MY - SaaS Platform</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f7fb;
}

.header{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    padding:20px;
}

.auth{
    background:white;
    margin:20px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

input{
    padding:10px;
    margin:5px;
    width:200px;
}

button{
    padding:10px 15px;
    background:#1e3a8a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.container{
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
</style>

</head>

<body>

<div class="header">
<h2>PropertyIntel MY (Firebase SaaS Working)</h2>
</div>

<div class="auth">
<h3>Login / Register</h3>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="status">Not logged in</p>
</div>

<div class="container" id="list"></div>

<!-- FIREBASE (MODERN SDK) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
  authDomain: "roadtob-d0c2d.firebaseapp.com",
  projectId: "roadtob-d0c2d",
  storageBucket: "roadtob-d0c2d.firebasestorage.app",
  messagingSenderId: "795422777154",
  appId: "1:795422777154:web:905f3a443b5bf1df1572db"
};

/* INIT */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH FUNCTIONS */
window.signup = async function(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    try{
        const userCred = await createUserWithEmailAndPassword(auth, email, pass);

        await setDoc(doc(db, "users", userCred.user.uid), {
            email: email,
            plan: "free"
        });

        alert("Signup success");
    } catch(err){
        alert(err.message);
    }
}

window.login = async function(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    try{
        await signInWithEmailAndPassword(auth, email, pass);
        alert("Login success");
    } catch(err){
        alert(err.message);
    }
}

/* USER STATE */
onAuthStateChanged(auth, async (user)=>{

    if(user){
        let docRef = doc(db, "users", user.uid);
        let snap = await getDoc(docRef);

        let plan = snap.exists() ? snap.data().plan : "free";

        document.getElementById("status").innerText =
        "Logged in: " + user.email + " (" + plan + ")";

        loadData(plan);
    }
});

/* SAMPLE PROPERTY DATA */
function loadData(plan){

    let data = [
        {name:"Residensi Alpha", price:520000},
        {name:"SkyVista Residence", price:780000},
        {name:"Metro Heights", price:430000}
    ];

    let html = "";

    data.forEach(p=>{
        html += `
        <div class="card">
            <h3>${p.name}</h3>
            <p>RM ${p.price}</p>
            ${plan === "free" ? "<p style='color:red'>Upgrade to PRO for more insights</p>" : "<p style='color:green'>PRO unlocked insights</p>"}
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

</script>

</body>
</html>
