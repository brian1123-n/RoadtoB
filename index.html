<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyIntel MY - SaaS Platform</title>

<!-- Firebase (backend) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f7fb;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    padding:20px;
}

/* AUTH BOX */
.auth{
    background:white;
    margin:20px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

input{
    padding:10px;
    margin:5px;
    width:200px;
}

/* BUTTON */
button{
    padding:10px 15px;
    background:#1e3a8a;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* DASHBOARD */
.container{
    padding:20px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.card{
    background:white;
    width:260px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.price{
    color:green;
    font-weight:bold;
}

/* LOCK OVERLAY */
.locked{
    opacity:0.4;
    position:relative;
}

.badge{
    background:red;
    color:white;
    padding:3px 8px;
    font-size:12px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
    <h2>PropertyIntel MY (Subscription SaaS MVP)</h2>
</div>

<!-- AUTH -->
<div class="auth">
    <h3>Login / Register</h3>

    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="status">Not logged in</p>
</div>

<!-- DASHBOARD -->
<div class="container" id="properties"></div>

<script>

/* ================= FIREBASE CONFIG ================= */
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
  authDomain: "roadtob-d0c2d.firebaseapp.com",
  projectId: "roadtob-d0c2d",
  storageBucket: "roadtob-d0c2d.firebasestorage.app",
  messagingSenderId: "795422777154",
  appId: "1:795422777154:web:905f3a443b5bf1df1572db",
  measurementId: "G-7QS7V33F29"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= USER STATE ================= */
let currentUser = null;
let userPlan = "free";

/* ================= AUTH ================= */
function signup(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(user=>{
        db.collection("users").doc(user.user.uid).set({
            email: email,
            plan: "free"
        });
    });
}

function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass);
}

/* ================= AUTH STATE ================= */
auth.onAuthStateChanged(user=>{
    if(user){
        currentUser = user;

        db.collection("users").doc(user.uid).get()
        .then(doc=>{
            userPlan = doc.data().plan;

            document.getElementById("status").innerText =
            "Logged in as " + user.email + " (" + userPlan + ")";

            loadProperties();
        });
    }
});

/* ================= PROPERTY DATA ================= */
let properties = [
    {name:"Residensi Alpha", price:520000, size:750, location:"Cheras", premium:false},
    {name:"SkyVista Residence", price:780000, size:900, location:"Kajang", premium:true},
    {name:"Metro Heights", price:430000, size:680, location:"Setapak", premium:false},
    {name:"Urban Suites", price:610000, size:820, location:"KL City", premium:true}
];

/* ================= LOAD PROPERTIES ================= */
function loadProperties(){

    let container = document.getElementById("properties");
    container.innerHTML = "";

    properties.forEach(p=>{

        let isLocked = p.premium && userPlan !== "pro";

        container.innerHTML += `
        <div class="card ${isLocked ? 'locked' : ''}">
            <h3>${p.name} ${p.premium ? '<span class="badge">PRO</span>' : ''}</h3>
            <p class="price">RM ${p.price}</p>
            <p>${p.size} sqft</p>
            <p>${p.location}</p>

            ${isLocked ? '<p style="color:red;">Upgrade to PRO to view full details</p>' : ''}
        </div>`;
    });
}

/* ================= UPGRADE SIMULATION ================= */
function upgradeToPro(){
    if(!currentUser) return alert("Login first!");

    db.collection("users").doc(currentUser.uid).update({
        plan:"pro"
    });

    alert("Upgraded to PRO!");
}

</script>

</body>
</html>
