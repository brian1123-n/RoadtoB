<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyIntel MY - Level 100</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#f4f6fb;
}

/* HEADER */
.header{
    background:#0f172a;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* CONTAINERS */
.container{
    max-width:1200px;
    margin:auto;
    padding:15px;
}

/* LOGIN */
.authBox{
    max-width:400px;
    margin:60px auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.primary{background:#2563eb;color:white;}
.dark{background:#0f172a;color:white;}
.red{background:#ef4444;color:white;}
.green{background:#22c55e;color:white;}

/* DASHBOARD */
.dashboard{
    display:none;
}

/* FILTER BAR */
.filters{
    display:flex;
    gap:10px;
    margin:10px 0;
}

.filters input, .filters select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    position:relative;
}

.price{
    color:#16a34a;
    font-weight:bold;
}

/* TAGS */
.tag{
    position:absolute;
    top:10px;
    right:10px;
    background:#f59e0b;
    padding:5px 8px;
    border-radius:20px;
    font-size:10px;
    color:white;
}

/* COMPARE PANEL */
.comparePanel{
    background:white;
    padding:15px;
    margin-top:20px;
    border-radius:12px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}
td,th{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>🏠 PropertyIntel MY</div>
    <div id="userStatus">Not logged in</div>
</div>

<!-- AUTH -->
<div id="authView" class="authBox">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">

    <button class="primary" onclick="signup()">Sign Up</button>
    <button class="dark" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="dashboard container">

    <button class="red" onclick="logout()">Logout</button>

    <!-- FILTERS -->
    <div class="filters">
        <input id="search" placeholder="Search property..." onkeyup="render()">
        <select id="typeFilter" onchange="render()">
            <option value="">All</option>
            <option value="Condo">Condo</option>
            <option value="Apartment">Apartment</option>
        </select>
    </div>

    <!-- GRID -->
    <div class="grid" id="list"></div>

    <!-- COMPARE -->
    <button class="green" onclick="showCompare()">
        Compare (<span id="compareCount">0</span>)
    </button>

    <div class="comparePanel" id="compareBox"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
authDomain: "roadtob-d0c2d.firebaseapp.com",
projectId: "roadtob-d0c2d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let properties = [];
let compare = [];

/* AUTH */
window.signup = async ()=>{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
    alert("Signup success");
};

window.login = async ()=>{
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Login success");
};

window.logout = async ()=>{
    await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
    if(!user){
        authView.style.display="block";
        app.style.display="none";
        return;
    }

    authView.style.display="none";
    app.style.display="block";

    userStatus.innerText = user.email;

    load();
});

/* LOAD DATA */
async function load(){
    const snap = await getDocs(collection(db,"properties"));

    properties = snap.docs.map(d=>d.data());

    render();
}

/* RENDER */
window.render = function(){

let keyword = search.value?.toLowerCase() || "";
let type = typeFilter.value;

let filtered = properties.filter(p=>
    p.name.toLowerCase().includes(keyword) &&
    (type==="" || p.type===type)
);

list.innerHTML = filtered.map(p=>`
<div class="card">
<div class="tag">HOT</div>

<h3>${p.name}</h3>
<p>${p.location}</p>
<p>${p.type}</p>
<p class="price">RM ${p.price}</p>

<button class="primary" onclick="addCompare('${p.name}')">
Add Compare
</button>

</div>
`).join("");
};

/* COMPARE */
window.addCompare = function(name){

let p = properties.find(x=>x.name===name);

if(compare.length>=3){
    alert("Max 3");
    return;
}

compare.push(p);
compareCount.innerText = compare.length;
};

/* SHOW COMPARE */
window.showCompare = function(){

if(compare.length<2){
    alert("Select at least 2");
    return;
}

compareBox.innerHTML = `
<h3>Comparison</h3>
<table>
<tr>
<th>Field</th>
${compare.map(p=>`<th>${p.name}</th>`).join("")}
</tr>

<tr>
<td>Price</td>
${compare.map(p=>`<td>${p.price}</td>`).join("")}
</tr>

<tr>
<td>Location</td>
${compare.map(p=>`<td>${p.location}</td>`).join("")}
</tr>

<tr>
<td>Type</td>
${compare.map(p=>`<td>${p.type}</td>`).join("")}
</tr>
</table>
`;
};

</script>

</body>
</html>
