<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property SaaS Stable Base</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#f4f6fb;
}

.header{
    background:#0f172a;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.box{
    background:white;
    padding:15px;
    margin:20px auto;
    max-width:420px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.primary{background:#2563eb;color:white;}
.dark{background:#0f172a;color:white;}
.red{background:#ef4444;color:white;}
.green{background:#22c55e;color:white;}

.container{padding:15px;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.price{color:#16a34a;font-weight:bold;}

.compareBox{
    background:white;
    margin-top:15px;
    padding:15px;
    border-radius:12px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
<div>🏠 Property SaaS</div>
<div id="userStatus">Loading...</div>
</div>

<!-- LOGIN -->
<div id="authView" class="box">
<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" placeholder="Password">

<button class="primary" onclick="signup()">Sign Up</button>
<button class="dark" onclick="login()">Login</button>

<div id="msg"></div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<button class="red" onclick="logout()">Logout</button>

<h3>Properties</h3>
<div id="list" class="grid"></div>

<button class="primary" onclick="showCompare()">
Compare (<span id="compareCount">0</span>)
</button>

<div id="compareBox" class="compareBox"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
authDomain: "roadtob-d0c2d.firebaseapp.com",
projectId: "roadtob-d0c2d"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

/* DOM SAFE INIT */
const authView = document.getElementById("authView");
const appView = document.getElementById("app");
const userStatus = document.getElementById("userStatus");
const list = document.getElementById("list");

/* STATE */
let properties = [];
let compare = [];

/* AUTH */
window.signup = async () => {
try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
msg.innerText = "Signup success";
}catch(e){
msg.innerText = e.message;
}
};

window.login = async () => {
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
msg.innerText = "Login success";
}catch(e){
msg.innerText = e.message;
}
};

window.logout = async () => {
await signOut(auth);
compare = [];
};

/* SAFE AUTH FLOW (NO FLICKER) */
authView.style.display = "block";
appView.style.display = "none";

onAuthStateChanged(auth, async (user) => {

console.log("AUTH STATE:", user);

if(!user){
authView.style.display = "block";
appView.style.display = "none";
userStatus.innerText = "Not logged in";
return;
}

/* LOCK UI FIRST */
authView.style.display = "none";
appView.style.display = "block";

userStatus.innerText = user.email;

/* LOAD DATA */
await load();

});

/* LOAD FIRESTORE (SAFE) */
async function load(){
try{

const snap = await getDocs(collection(db,"properties"));

console.log("Firestore docs:", snap.size);

properties = [];

snap.forEach(d=>{
properties.push(d.data());
});

render();

}catch(err){
console.error("LOAD ERROR:", err);
list.innerHTML = "<p>Failed to load data</p>";
}
}

/* RENDER */
function render(){

if(!properties || properties.length === 0){
list.innerHTML = "<p>No properties found in Firestore.</p>";
return;
}

list.innerHTML = properties.map((p,i)=>`
<div class="card">
<h3>${p.name ?? "-"}</h3>
<p>${p.location ?? "-"}</p>
<p>${p.type ?? "-"}</p>
<p class="price">RM ${p.price ?? 0}</p>

<button class="primary" onclick="addCompare(${i})">
Add to Compare
</button>

</div>
`).join("");

}

/* COMPARE */
window.addCompare = function(i){

const p = properties[i];

if(!p){
alert("Invalid property");
return;
}

if(compare.length >= 3){
alert("Max 3 only");
return;
}

compare.push(p);

document.getElementById("compareCount").innerText = compare.length;

};

/* COMPARE TABLE */
window.showCompare = function(){

if(compare.length < 2){
alert("Select at least 2 properties");
return;
}

document.getElementById("compareBox").innerHTML = `
<h3>Comparison</h3>

<table>
<tr>
<th>Field</th>
${compare.map(p=>`<th>${p.name}</th>`).join("")}
</tr>

<tr>
<td>Price</td>
${compare.map(p=>`<td>${p.price}</td>`).join("")}
</tr>

<tr>
<td>Location</td>
${compare.map(p=>`<td>${p.location}</td>`).join("")}
</tr>

<tr>
<td>Type</td>
${compare.map(p=>`<td>${p.type}</td>`).join("")}
</tr>

</table>
`;

};

</script>

</body>
</html>
