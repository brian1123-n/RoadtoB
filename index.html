<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropertyIntel MY - SaaS</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#f1f5f9;
}

/* NAV */
.nav{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.badge{
    background:#22c55e;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}

/* BOX */
.box{
    background:white;
    margin:15px auto;
    padding:15px;
    border-radius:12px;
    max-width:420px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.btn1{background:#1d4ed8;color:white;}
.btn2{background:#0f172a;color:white;}
.btn3{background:#22c55e;color:white;}
.btn4{background:#ef4444;color:white;}

/* FILTER */
.filter{
    padding:10px 15px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */
.card{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
    position:relative;
}

.price{
    font-size:18px;
    font-weight:bold;
    color:#16a34a;
}

.badgeHot{
    position:absolute;
    top:10px;
    right:10px;
    background:#f59e0b;
    color:white;
    padding:4px 8px;
    font-size:10px;
    border-radius:20px;
}

/* COMPARE */
.compareBox{
    padding:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

td,th{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <div>🏠 PropertyIntel MY</div>
    <div id="planTag" class="badge">FREE</div>
</div>

<!-- LOGIN -->
<div class="box">
    <h3>Login / Register</h3>

    <input id="email" placeholder="Email">
    <input id="password" placeholder="Password">

    <button class="btn1" onclick="signup()">Sign Up</button>
    <button class="btn2" onclick="login()">Login</button>

    <button class="btn4" onclick="logout()">Logout</button>

    <div id="status">Not logged in</div>
</div>

<!-- COMPARE BUTTON -->
<div style="padding:10px;text-align:center;">
    <button class="btn3" onclick="showCompare()">
        Compare Properties 📊 (<span id="compareCount">0</span>)
    </button>
</div>

<!-- GRID -->
<div class="grid" id="list"></div>

<!-- COMPARE BOX -->
<div class="compareBox" id="compareBox"></div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
authDomain: "roadtob-d0c2d.firebaseapp.com",
projectId: "roadtob-d0c2d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let properties = [];
let compareList = [];

/* SIGNUP */
window.signup = async function(){
    const u = await createUserWithEmailAndPassword(auth,email.value,password.value);

    await setDoc(doc(db,"users",u.user.uid),{
        plan:"free"
    });

    alert("Signup success");
};

/* LOGIN */
window.login = async function(){
    await signInWithEmailAndPassword(auth,email.value,password.value);
    alert("Login success");
};

/* LOGOUT */
window.logout = async function(){
    await signOut(auth);

    compareList = [];
    compareCount.innerText = "0";
    compareBox.innerHTML = "";
    status.innerText = "Logged out";
    planTag.innerText = "FREE";

    alert("Logged out");
};

/* AUTH STATE */
onAuthStateChanged(auth, async (user)=>{
    if(!user){
        status.innerText = "Not logged in";
        return;
    }

    const snap = await getDoc(doc(db,"users",user.uid));

    status.innerText = "Logged in: " + user.email;
    planTag.innerText = (snap.data()?.plan || "free").toUpperCase();

    load();
});

/* LOAD PROPERTIES */
async function load(){
    const snap = await getDocs(collection(db,"properties"));

    properties = snap.docs.map(d=>d.data());

    render();
}

/* RENDER */
window.render = function(){

list.innerHTML = properties.map(p=>`

<div class="card">
<div class="badgeHot">HOT</div>

<h3>${p.name}</h3>
<p>${p.location}</p>
<p>${p.type}</p>
<p class="price">RM ${p.price}</p>

<button onclick='addCompare(${JSON.stringify(p)})'
style="background:#1d4ed8;color:white;border:none;padding:8px;border-radius:6px;width:100%;">
Add to Compare
</button>

</div>

`).join("");

};

/* ADD COMPARE */
window.addCompare = function(p){

if(compareList.length >= 3){
    alert("Max 3 only");
    return;
}

compareList.push(p);
compareCount.innerText = compareList.length;

alert("Added to compare");
};

/* SHOW COMPARE */
window.showCompare = function(){

if(compareList.length < 2){
    alert("Select at least 2 properties");
    return;
}

compareBox.innerHTML = `
<h2>Comparison</h2>

<table>
<tr>
<th>Field</th>
${compareList.map(p=>`<th>${p.name}</th>`).join("")}
</tr>

<tr>
<td>Price</td>
${compareList.map(p=>`<td>RM ${p.price}</td>`).join("")}
</tr>

<tr>
<td>Location</td>
${compareList.map(p=>`<td>${p.location}</td>`).join("")}
</tr>

<tr>
<td>Type</td>
${compareList.map(p=>`<td>${p.type}</td>`).join("")}
</tr>

</table>
`;

};

</script>

</body>
</html>
