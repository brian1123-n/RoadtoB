<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoadToB Property Platform</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:20px;
}

.layout{
display:grid;
grid-template-columns:250px 1fr 320px;
gap:20px;
}

.panel,.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.red{
background:#ef4444;
color:white;
}

.price{
color:green;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<div>🏠 RoadToB Property</div>
<div id="userStatus">Loading...</div>
</div>

<div id="authBox" class="panel" style="max-width:400px;margin:30px auto;">
<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="primary" onclick="signup()">
Sign Up
</button>

<button class="primary" onclick="login()">
Login
</button>

<div id="msg"></div>
</div>

<div id="app" class="container" style="display:none;">

<button class="red" onclick="logout()">
Logout
</button>

<div class="layout">

<!-- LEFT -->
<div class="panel">

<h3>Search</h3>

<input id="search"
placeholder="Search property"
onkeyup="render()">

<select id="typeFilter"
onchange="render()">

<option value="">
All
</option>

<option value="Condo">
Condo
</option>

<option value="Landed">
Landed
</option>

</select>

<hr>

<h3>Add Property</h3>

<input id="pname" placeholder="Name">
<input id="plocation" placeholder="Location">
<input id="ptype" placeholder="Type">
<input id="pprice" placeholder="Price">

<button class="primary"
onclick="addProperty()">
Add
</button>

</div>

<!-- CENTER -->
<div>

<h3>Properties</h3>

<div id="list"
class="grid">
</div>

</div>

<!-- RIGHT -->
<div class="panel">

<h3>🏠 Loan Calculator</h3>

<input id="loanPrice"
placeholder="Price">

<input id="loanDown"
placeholder="Down %"
value="10">

<input id="loanRate"
placeholder="Rate %"
value="4.2">

<input id="loanYear"
placeholder="Years"
value="35">

<button class="primary"
onclick="calcLoan()">
Calculate
</button>

<div id="loanResult"></div>

<hr>

<h3>Investment</h3>

<div id="detailPanel">
Select property
</div>

</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
addDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
authDomain:"roadtob-d0c2d.firebaseapp.com",
projectId:"roadtob-d0c2d"
};

const appFirebase=
initializeApp(firebaseConfig);

const auth=
getAuth(appFirebase);

const db=
getFirestore(appFirebase);

let properties=[];

window.signup=async()=>{
await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);
};

window.login=async()=>{
await signInWithEmailAndPassword(
auth,
email.value,
password.value
);
};

window.logout=async()=>{
await signOut(auth);
};

onAuthStateChanged(
auth,
async(user)=>{

if(!user){

authBox.style.display="block";
app.style.display="none";

return;

}

authBox.style.display="none";
app.style.display="block";

userStatus.innerText=
user.email;

await load();

});

async function load(){

try{

const snap=
await getDocs(
collection(
db,
"properties"
)
);

properties=
snap.docs.map(
d=>({
id:d.id,
...d.data()
})
);

}catch(e){

properties=[
{
name:"Connaught One",
location:"Cheras",
type:"Condo",
price:464000
},
{
name:"Aricia Residences",
location:"Sungai Long",
type:"Condo",
price:530000
}
];

}

render();

}

window.addProperty=
async()=>{

await addDoc(
collection(
db,
"properties"
),
{
name:pname.value,
location:plocation.value,
type:ptype.value,
price:Number(
pprice.value
)
}
);

load();

};

window.render=()=>{

let keyword=
search.value
.toLowerCase();

let type=
typeFilter.value;

let filtered=
properties.filter(
p=>

p.name
.toLowerCase()
.includes(keyword)

&&

(
type==""

||

p.type==type
)

);

list.innerHTML=
filtered.map(
(p,index)=>`

<div class="card">

<h3>${p.name}</h3>

<p>
${p.location}
</p>

<p>
${p.type}
</p>

<p class="price">
RM ${p.price}
</p>

<button class="primary"
onclick="openDetail(${index})">
Analyse
</button>

</div>

`
).join("");

};

window.openDetail=
(i)=>{

let p=
properties[i];

let rent=
p.price*0.004;

let roi=
(
rent*12
/
p.price
)*100;

detailPanel.innerHTML=`

<p>
<b>
${p.name}
</b>
</p>

<p>
Rent:
RM
${rent.toFixed(0)}
</p>

<p>
ROI:
${roi.toFixed(2)}%
</p>

`;

};

window.calcLoan=()=>{

let price=
Number(
loanPrice.value
);

let down=
Number(
loanDown.value
);

let rate=
Number(
loanRate.value
);

let year=
Number(
loanYear.value
);

let loan=
price*
(
1-down/100
);

let r=
rate/100/12;

let n=
year*12;

let monthly=
(
loan*r
)
/
(
1-
Math.pow(
1+r,
-n
)
);

loanResult.innerHTML=`

<p>
Loan:
RM
${loan.toFixed(0)}
</p>

<p>
Monthly:
RM
${monthly.toFixed(0)}
</p>

`;

};

</script>

</body>
</html>
