<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropTech SaaS MY</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#f4f6fb;
}

.header{
background:#0f172a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
padding:15px;
}

.layout{
display:flex;
gap:15px;
}

/* PANELS */
.panel{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

/* LEFT */
.left{
width:20%;
}

/* CENTER */
.center{
width:55%;
}

/* RIGHT */
.right{
width:25%;
}

/* CARD */
.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
margin-bottom:10px;
cursor:pointer;
transition:0.2s;
}
.card:hover{
transform:translateY(-3px);
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#2563eb;color:white;}
.red{background:#ef4444;color:white;}

/* INPUT */
input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:1px solid #ddd;
}

.price{color:#16a34a;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<div>🏠 PropTech SaaS</div>
<div id="userStatus">Loading...</div>
</div>

<!-- LOGIN -->
<div id="authBox" class="panel" style="max-width:400px;margin:20px auto;">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" placeholder="Password">
<button class="primary" onclick="signup()">Sign Up</button>
<button class="primary" onclick="login()">Login</button>
<div id="msg"></div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<button class="red" onclick="logout()">Logout</button>

<div class="layout">

<!-- LEFT FILTER -->
<div class="panel left">
<h3>Filters</h3>

<input id="search" placeholder="Search..." onkeyup="render()">

<select id="typeFilter" onchange="render()">
<option value="">All</option>
<option value="Condo">Condo</option>
<option value="Landed">Landed</option>
</select>

</div>

<!-- CENTER -->
<div class="panel center">
<h3>Properties</h3>
<div id="list"></div>
</div>

<!-- RIGHT -->
<div class="panel right">
<h3>Investment Tool</h3>

<div id="detailPanel">
<p>Select property</p>
</div>

</div>

</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBOxWZEatKcMxCgt23vobv3a1hJV9Qw4y0",
authDomain: "roadtob-d0c2d.firebaseapp.com",
projectId: "roadtob-d0c2d"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

/* DOM */
const authBox = document.getElementById("authBox");
const appBox = document.getElementById("app");
const userStatus = document.getElementById("userStatus");
const list = document.getElementById("list");

let properties = [];

/* AUTH */
window.signup = async () => {
try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
msg.innerText = "Signup success";
}catch(e){
msg.innerText = e.message;
}
};

window.login = async () => {
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
msg.innerText = "Login success";
}catch(e){
msg.innerText = e.message;
}
};

window.logout = async () => {
await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, async (user)=>{

if(!user){
authBox.style.display="block";
appBox.style.display="none";
return;
}

authBox.style.display="none";
appBox.style.display="block";

userStatus.innerText = user.email;

await load();

});

/* LOAD */
async function load(){

const snap = await getDocs(collection(db,"properties"));

properties = snap.docs.map(d=>d.data());

render();

}

/* RENDER */
function render(){

let keyword = search?.value?.toLowerCase() || "";
let type = typeFilter?.value || "";

let filtered = properties.filter(p=>
p.name.toLowerCase().includes(keyword) &&
(type === "" || p.type === type)
);

list.innerHTML = filtered.map((p,i)=>`
<div class="card" onclick="openDetail(${i})">
<h3>${p.name}</h3>
<p>${p.location}</p>
<p>${p.type}</p>
<p class="price">RM ${p.price}</p>
</div>
`).join("");

}

/* DETAIL + INVESTMENT */
window.openDetail = function(i){

let p = properties[i];

let rent = p.price * 0.004;
let roi = (rent*12/p.price)*100;

let loan = calcLoan(p.price,10,4.2,35);

document.getElementById("detailPanel").innerHTML = `

<h3>${p.name}</h3>
<p>${p.location}</p>

<hr>

<h4>💰 Investment</h4>

<p>Rent: RM ${rent.toFixed(0)}</p>
<p>ROI: ${roi.toFixed(2)}%</p>
<p>Loan: RM ${loan.monthly.toFixed(0)}</p>
<p>Cashflow: RM ${(rent-loan.monthly).toFixed(0)}</p>

`;
};

/* LOAN */
function calcLoan(price,down,rate,year){

let loan = price*(1-down/100);
let r = rate/100/12;
let n = year*12;

let monthly = (loan*r)/(1-Math.pow(1+r,-n));

return {monthly};
}

</script>

</body>
</html>
