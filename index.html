<!DOCTYPE html>
<html>
<head>
    <title>Property Comparison</title>

    <style>
        body {
            background-color: #f4f6f8;
            font-family: Arial;
            color: #333;
        }

        h1 {
            color: #1e88e5;
        }

        table {
            background-color: white;
            border-collapse: collapse;
        }

        th {
            background-color: #1e88e5;
            color: white;
        }

        td, th {
            padding: 10px;
        }
    </style>

</head>

<body>

<h1>Malaysia Property Comparison</h1>

<table border="1">
    <tr>
        <th>Project</th>
        <th>Price</th>
        <th>Size</th>
        <th>Location</th>
    </tr>

    <tr>
        <td>Project A</td>
        <td>RM500,000</td>
        <td>750 sqft</td>
        <td>Cheras</td>
    </tr>

</table>

</body>
</html>

</html>
